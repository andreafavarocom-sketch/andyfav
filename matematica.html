<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Area Download - Appunti di Matematica</title>
     <link rel="stylesheet" href="style.css">
</head>
<body class="math-page">

    <div class="container">
        <header>
            <h1>Angolo di Matematica</h1>
            <p>Raccolta Appunti & Risorse di Andrea</p>
        </header>

        <div class="admin-toggle-panel">
            <span>Pannello di Caricamento (Solo per Andrea)</span>
            <label class="switch">
                <input type="checkbox" id="adminToggle" onchange="toggleAdminMode()">
                <span class="slider"></span>
            </label>
        </div>

        <h2>Archivio Documenti PDF</h2>

        <div class="topic-box" id="topic-polinomi">
            <div class="topic-title">📐 Polinomi</div>
            <ul class="file-list" id="list-polinomi">
                </ul>
            <div class="upload-section">
                <label class="upload-label">
                    ➕ Carica PDF per Polinomi
                    <input type="file" class="file-input" accept=".pdf" onchange="handleFileUpload(this, 'polinomi')">
                </label>
            </div>
        </div>

        <div class="topic-box" id="topic-goniometria">
            <div class="topic-title">🔄 Goniometria & Trigonometria</div>
            <ul class="file-list" id="list-goniometria"></ul>
            <div class="upload-section">
                <label class="upload-label">
                    ➕ Carica PDF per Goniometria
                    <input type="file" class="file-input" accept=".pdf" onchange="handleFileUpload(this, 'goniometria')">
                </label>
            </div>
        </div>

        <div class="topic-box" id="topic-limiti">
            <div class="topic-title">📉 Limiti</div>
            <ul class="file-list" id="list-limiti"></ul>
            <div class="upload-section">
                <label class="upload-label">
                    ➕ Carica PDF per Limiti
                    <input type="file" class="file-input" accept=".pdf" onchange="handleFileUpload(this, 'limiti')">
                </label>
            </div>
        </div>

        <div class="topic-box" id="topic-derivate">
            <div class="topic-title">⚡ Derivate</div>
            <ul class="file-list" id="list-derivate"></ul>
            <div class="upload-section">
                <label class="upload-label">
                    ➕ Carica PDF per Derivate
                    <input type="file" class="file-input" accept=".pdf" onchange="handleFileUpload(this, 'derivate')">
                </label>
            </div>
        </div>

        <div class="topic-box" id="topic-integrali">
            <div class="topic-title">🧱 Integrali</div>
            <ul class="file-list" id="list-integrali"></ul>
            <div class="upload-section">
                <label class="upload-label">
                    ➕ Carica PDF per Integrali
                    <input type="file" class="file-input" accept=".pdf" onchange="handleFileUpload(this, 'integrali')">
                </label>
            </div>
        </div>

        <div class="topic-box" id="topic-funzioni">
            <div class="topic-title">📊 Studio di Funzioni</div>
            <ul class="file-list" id="list-funzioni"></ul>
            <div class="upload-section">
                <label class="upload-label">
                    ➕ Carica PDF per Studio di Funzioni
                    <input type="file" class="file-input" accept=".pdf" onchange="handleFileUpload(this, 'funzioni')">
                </label>
            </div>
        </div>

    </div>

    <script>
        // Mostra/Nascondi pannelli di caricamento e tasti elimina
        function toggleAdminMode() {
            const isAdmin = document.getElementById('adminToggle').checked;
            const uploadSections = document.querySelectorAll('.upload-section');
            const deleteButtons = document.querySelectorAll('.delete-btn');

            uploadSections.forEach(section => {
                section.style.display = isAdmin ? 'block' : 'none';
            });

            deleteButtons.forEach(btn => {
                btn.style.display = isAdmin ? 'inline-block' : 'none';
            });
        }

        // Funzione di upload e conversione file
        function handleFileUpload(input, category) {
            const file = input.files[0];
            if (!file) return;

            if (file.type !== "application/pdf") {
                alert("Per favore, seleziona solo file in formato PDF!");
                input.value = "";
                return;
            }

            const reader = new FileReader();
            reader.onload = function(e) {
                const fileData = {
                    name: file.name,
                    data: e.target.result
                };

                saveFileToStorage(category, fileData);
                renderFiles();
                input.value = "";
            };
            reader.readAsDataURL(file);
        }

        // Gestione database locale simulato (LocalStorage)
        function getFilesFromStorage() {
            const files = localStorage.getItem('andrea_math_files');
            return files ? JSON.parse(files) : {};
        }

        function saveFileToStorage(category, fileData) {
            const allFiles = getFilesFromStorage();
            if (!allFiles[category]) {
                allFiles[category] = [];
            }
            allFiles[category].push(fileData);
            localStorage.setItem('andrea_math_files', JSON.stringify(allFiles));
        }

        function deleteFile(category, index) {
            const allFiles = getFilesFromStorage();
            if (allFiles[category]) {
                allFiles[category].splice(index, 1);
                localStorage.setItem('andrea_math_files', JSON.stringify(allFiles));
                renderFiles();
            }
        }

        // Costruisce la lista dei file visibili sulla pagina
        function renderFiles() {
            const allFiles = getFilesFromStorage();
            const categories = ['polinomi', 'goniometria', 'limiti', 'derivate', 'integrali', 'funzioni'];
            const isAdmin = document.getElementById('adminToggle').checked;

            categories.forEach(cat => {
                const list = document.getElementById(`list-${cat}`);
                let htmlContent = '';

                if (allFiles[cat] && allFiles[cat].length > 0) {
                    allFiles[cat].forEach((file, index) => {
                        htmlContent += `
                            <li class="file-item">
                                <div class="file-info">
                                    <span class="file-icon">📄 PDF</span>
                                    <span>${file.name}</span>
                                </div>
                                <div>
                                    <a href="${file.data}" download="${file.name}" class="download-btn">Scarica</a>
                                    <button class="delete-btn" style="display: ${isAdmin ? 'inline-block' : 'none'}" onclick="deleteFile('${cat}', ${index})">Elimina</button>
                                </div>
                            </li>`;
                    });
                } else {
                    htmlContent = `<li class="file-item no-files-msg">Nessun file caricato per questo argomento.</li>`;
                }

                list.innerHTML = htmlContent;
            });
        }

        // Inizializza l'elenco al caricamento
        window.onload = function() {
            renderFiles();
        };
    </script>
</body>
</html>
